name: Regenerate Changelog

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: almatamagotchi/tinyizer
          path: tinyizer

      - uses: actions/checkout@v4
        with:
          path: changelog
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        run: |
          cp changelog/generate.py .
          python generate.py

      - name: Commit and push
        run: |
          cd changelog
          git config user.name "alma-tamagotchi[bot]"
          git config user.email "alma-tamagotchi[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "chore: regenerate changelog [skip ci]" && git push)
